AWSTemplateFormatVersion: '2010-09-09'
Description: 'Code Industries - Dev RDS MySQL Single AZ'

Parameters:
  ProjectName:
    Type: String
    Default: codeindustries

  Environment:
    Type: String
    Default: staging

  DBName:
    Type: String
    Default: ncjobcarirlive
    Description: Database name

  DBUsername:
    Type: String
    Default: ddj_app_user
    Description: Master username

  DBPassword:
    Type: String
    NoEcho: true
    Description: Master password

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

  DBAllocatedStorage:
    Type: Number
    Default: 20

Resources:

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${ProjectName}-${Environment}-db-subnet-group'
      DBSubnetGroupDescription: Private subnets for dev RDS
      SubnetIds:
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-PrivateSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-PrivateSubnet2Id'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-db-subnet-group'

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-${Environment}-mysql'
      DBName: !Ref DBName
      Engine: mysql
      EngineVersion: '8.0'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-RDSSecurityGroupId'
      MultiAZ: false
      PubliclyAccessible: false
      DeletionProtection: false
      BackupRetentionPeriod: 3
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-rds'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DBInstanceId:
    Description: RDS Instance ID
    Value: !Ref DBInstance
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DBInstanceId'

  DBEndpoint:
    Description: RDS Endpoint
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DBEndpoint'

  DBPort:
    Description: RDS Port
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DBPort'
