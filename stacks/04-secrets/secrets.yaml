AWSTemplateFormatVersion: '2010-09-09'
Description: 'Code Industries - Secrets Manager for DB and application secrets'

Parameters:
  ProjectName:
    Type: String
    Default: codeindustries

  Environment:
    Type: String
    Default: prod

  DBUsername:
    Type: String
    Default: ddj_app_user
    Description: RDS master username

Resources:

  # ─── DB SECRET ─────────────────────────────────────────────────────────────
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/db'
      Description: RDS MySQL credentials
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-db-secret'
        - Key: Environment
          Value: !Ref Environment

  # ─── APP SECRET ────────────────────────────────────────────────────────────
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/app'
      Description: Application secrets - D_KEY, Google, Facebook, Microsoft, Twitter
      SecretString: !Sub |
        {
          "D_KEY": "5c84348d4fac7b70a0df87b79fcb634f66443dfd21c23298565b400676a02b57",
          "GOOGLE_API_KEY": "AIzaSyBxRdoxhzHEPAL7R7AofQHvhOF6PLzpqtw",
          "GOOGLE_RECAPTCHA_SITE_KEY": "6Ldib5QaAAAAABTpgBthkOQh1y0EVHphvr_WJ61v",
          "GOOGLE_RECAPTCHA_SECRET_KEY": "6Ldib5QaAAAAAG3zANQpcdya8zYlesPx9l75bA_o",
          "FB_APP_ID": "686011388187221",
          "FB_APP_SECRET": "342144453c6cb8bbd77214d4760a59c5",
          "MICROSOFT_CLIENT_SECRET": "VizfpU3UTLtKuYsSPDQsHfLWHDUNSjHs",
          "TWITTER_CONSUMER_KEY": "Dos0OmyC6vda2A7F5GJSzb6WU",
          "TWITTER_CONSUMER_SECRET": "lELdMHeppTNXPnAZCSDVMQK3xh8umkTFTHV6ctVrzcfjycpy4j"
        }
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-app-secret'
        - Key: Environment
          Value: !Ref Environment

  # ─── LAMBDA SECRET ─────────────────────────────────────────────────────────
  LambdaSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/lambda'
      Description: Lambda webhook secrets for malware scan and text extraction
      SecretString: !Sub |
        {
          "WEBHOOK_SECRET": "4b9c6c82d5cd33ebd0272ba21ef0483d07a381ba8e1b99fe704739fd49fd7952",
          "TEXTEXTRACT_WEBHOOK_SECRET": "458d265bfda33c14da4e73d18f0d8104230d82406becbc700b825b3b7032d9b7"
        }
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-lambda-secret'
        - Key: Environment
          Value: !Ref Environment

# ─── OUTPUTS ─────────────────────────────────────────────────────────────────
Outputs:
  DBSecretArn:
    Description: DB Secret ARN
    Value: !Ref DBSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DBSecretArn'

  AppSecretArn:
    Description: App Secret ARN
    Value: !Ref AppSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-AppSecretArn'

  LambdaSecretArn:
    Description: Lambda Secret ARN
    Value: !Ref LambdaSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-LambdaSecretArn'
