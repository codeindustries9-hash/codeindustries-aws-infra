AWSTemplateFormatVersion: '2010-09-09'
Description: 'Code Industries - Production Application Load Balancer'

Parameters:
  ProjectName:
    Type: String
    Default: codeindustries

  Environment:
    Type: String
    Default: prod

  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for HTTPS listener
    Default: ''

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:

  # ─── APPLICATION LOAD BALANCER ─────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-alb'
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-ALBSecurityGroupId'
      Subnets:
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-PublicSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-PublicSubnet2Id'
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: 'true'
        - Key: idle_timeout.timeout_seconds
          Value: '300'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb'
        - Key: Environment
          Value: !Ref Environment

  # ─── TARGET GROUP ──────────────────────────────────────────────────────────
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-tg'
      Port: 80
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-${Environment}-VpcId'
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200-399'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-tg'
        - Key: Environment
          Value: !Ref Environment

  # ─── HTTP LISTENER — redirect to HTTPS ─────────────────────────────────────
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # ─── HTTPS LISTENER ────────────────────────────────────────────────────────
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

# ─── OUTPUTS ─────────────────────────────────────────────────────────────────
Outputs:
  ALBArn:
    Description: ALB ARN
    Value: !Ref ALB
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBArn'

  ALBDnsName:
    Description: ALB DNS Name
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBDnsName'

  TargetGroupArn:
    Description: Target Group ARN
    Value: !Ref TargetGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-TargetGroupArn'

  HTTPSListenerArn:
    Description: HTTPS Listener ARN
    Condition: HasCertificate
    Value: !Ref HTTPSListener
    Export:
      Name: !Sub '${ProjectName}-${Environment}-HTTPSListenerArn'
